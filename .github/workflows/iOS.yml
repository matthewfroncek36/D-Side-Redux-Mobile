name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: iOS Build
    permissions: write-all
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7
          
      - name: Install Libraries
        run: |
         haxelib install hxpkg --global
         haxelib run hxpkg setup --global
         haxelib run hxpkg install
         git -C .haxelib/lime/git submodule update --init --recursive
         haxelib run lime rebuild hxcpp
         
      - name: Configure iOS
        run: |
          haxelib run lime setup ios
          haxelib run lime rebuild lime ios
          
      - name: Compile
        run: haxelib run lime build ios -nosign

      - name: Making ipa file
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos
          APP_BUNDLE="$(find . -maxdepth 1 -type d -name '*.app' -print -quit)"
          APP_NAME="$(basename "$APP_BUNDLE" .app)"
          if [ -z "$APP_BUNDLE" ]; then
            echo "No .app bundle found"
            exit 1
          fi
          if [ -f "../$APP_NAME/$APP_NAME.entitlements" ]; then
            ldid -S"../$APP_NAME/$APP_NAME.entitlements" "$APP_BUNDLE/$APP_NAME"
          else
            ldid -S "$APP_BUNDLE/$APP_NAME"
          fi
          rm -rf Payload
          mkdir Payload
          cp -R "$APP_BUNDLE" Payload/
          zip -r "$APP_NAME.ipa" Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: DSideRedux-iOS
          path: export/release/ios/build/Release-iphoneos/*.ipa
          if-no-files-found: error
